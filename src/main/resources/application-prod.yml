server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    # 사진 100MB 업로드 시 Tomcat 단에서 잘리지 않도록 풀어둠.
    # max-http-form-post-size: multipart 본문 size limit (default 2MB).
    # max-swallow-size: max-file-size 초과 시 클라이언트가 끝까지 보낸 바이트를 빨아들이는 한도.
    #   너무 작으면 connection reset 으로 클라에 한글 에러가 못 가고 끊김.
    max-http-form-post-size: 110MB
    max-swallow-size: 110MB

spring:
  config:
    import:
      - file:env/prod.env[.properties]

  application:
    name: digda-prod

  aot:
    enabled: false  # AOT 비활성화

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        # 목록 응답에서 LAZY images·createdBy 를 IN(...) 으로 일괄 로드해 N+1 제거.
        default_batch_fetch_size: 100
    open-in-view: false

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  task:
    scheduling:
      enabled: true
    execution:
      pool:
        core-size: 2
        max-size: 10
        queue-capacity: 100


jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}


oauth2:
  front-url: ${OAUTH2_FRONT_URL}

  kakao:
    base-url: ${KAKAO_OAUTH2_BASE_URL}
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    front-redirect-uri: ${KAKAO_FRONT_REDIRECT_URI}

  naver:
    base-url: ${NAVER_OAUTH2_BASE_URL}
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}

  apple:
    client-id: ${APPLE_CLIENT_ID}
    team-id: ${APPLE_TEAM_ID}
    key-id: ${APPLE_KEY_ID}
    private-key: ${APPLE_PRIVATE_KEY}
    redirect-uri: ${APPLE_REDIRECT_URI}
    profile: ${APPLE_PROFILE}


cloud:
  aws:
    stack:
      auto: false
    s3:
      bucket: ${S3_BUCKET}
    region:
      static: ${S3_REGION}
    credentials:
      accessKey: ${S3_ACCESS_KEY}
      secretKey: ${S3_SECRET_KEY}


fcm:
  project-id: ${FCM_PROJECT_ID}
  private-key-id: ${FCM_PRIVATE_KEY_ID}
  private-key: ${FCM_PRIVATE_KEY}
  client-email: ${FCM_CLIENT_EMAIL}
  client-id: ${FCM_CLIENT_ID}


admin:
  bootstrap:
    email: ${ADMIN_BOOTSTRAP_EMAIL}
    password: ${ADMIN_BOOTSTRAP_PASSWORD}
    name: ${ADMIN_BOOTSTRAP_NAME}


logging:
  level:
    root: INFO
    digdaserver: INFO
    org.springframework.web: ERROR

  # 파일 로그. 컨테이너의 /logs 는 호스트 /home/ubuntu/digda/logs 로 마운트됨(docker-compose.yml).
  # 현재 로그는 항상 digda.log, 자정(KST)에 digda.YYYY-MM-DD.0.log 로 롤오버된다.
  file:
    name: /logs/digda.log

  logback:
    rollingpolicy:
      # .gz 확장자를 주면 롤오버 시 자동 압축된다(평문 대비 약 1/10).
      # 오늘 로그(digda.log)는 평문이라 tail -f 그대로 되고, 지난 날짜만 압축 → zgrep/zcat 으로 조회.
      file-name-pattern: /logs/digda.%d{yyyy-MM-dd}.%i.log.gz
      # 30일 슬라이딩. 7/25 면 6/26~7/25 가 남고, 7/26 이 되면 6/26 이 자동 삭제된다.
      max-history: 30
      # 하루 로그가 커지면 .0/.1 로 쪼갠다(%i). 없으면 무제한 단일 파일.
      max-file-size: 100MB
      # 보관분(압축본) 총량 상한 — EC2 EBS 보호용 최후 방어선.
      # 30일이 이 값을 넘으면 오래된 것부터 먼저 지워진다.
      total-size-cap: 1GB
      # 컨테이너가 며칠 죽어 있었어도 재기동 시 오래된 파일을 정리.
      clean-history-on-start: true
